document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n    --safe-top: env(safe-area-inset-top, 0px);\n    --safe-bot: env(safe-area-inset-bottom, 0px);\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  html, body { -webkit-text-size-adjust: 100%; }\n\n  body {\n    background: var(--bg);\n    color: var(--text);\n    font-family: 'Karla', sans-serif;\n    font-size: 15px;\n    font-weight: 400;\n    line-height: 1.6;\n    max-width: 430px;\n    margin: 0 auto;\n    padding: calc(20px + var(--safe-top)) 18px calc(56px + var(--safe-bot));\n    -webkit-font-smoothing: antialiased;\n    -webkit-tap-highlight-color: transparent;\n  }\n\n  ::selection { background: var(--teal-soft); color: var(--teal-deep); }\n\n  /* Soft fade-in on scroll */\n  .fade-in {\n    opacity: 0;\n    transform: translateY(8px);\n    transition: opacity 0.6s ease, transform 0.6s ease;\n  }\n  .fade-in.visible {\n    opacity: 1;\n    transform: translateY(0);\n  }\n  @media (prefers-reduced-motion: reduce) {\n    .fade-in { opacity: 1; transform: none; transition: none; }\n  }\n\n  /* ── Sticky top banner ── */\n  .top-banner {\n    position: sticky;\n    top: 0;\n    z-index: 50;\n    margin: calc(-1 * (20px + var(--safe-top))) -18px 0;\n    padding: calc(12px + var(--safe-top)) 18px 12px;\n    background: rgba(242,243,240,0.88);\n    backdrop-filter: saturate(180%) blur(14px);\n    -webkit-backdrop-filter: saturate(180%) blur(14px);\n    border-bottom: 1px solid var(--border);\n    display: flex;\n    align-items: center;\n    gap: 8px;\n  }\n  .top-banner-title {\n    font-family: 'Lora', serif;\n    font-size: 18px;\n    font-style: italic;\n    color: var(--text);\n    flex: 1;\n    min-width: 0;\n    line-height: 1.2;\n  }\n  .top-banner-title em { font-style: normal; color: var(--teal); font-weight: 500; }\n  .banner-btn {\n    display: inline-flex;\n    align-items: center;\n    gap: 5px;\n    padding: 7px 11px;\n    background: var(--teal-soft);\n    border: 1px solid var(--teal-border);\n    border-radius: 18px;\n    font-family: 'Karla', sans-serif;\n    font-size: 10px;\n    font-weight: 600;\n    color: var(--teal);\n    cursor: pointer;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n    -webkit-tap-highlight-color: transparent;\n    transition: transform 0.1s, background 0.15s;\n    white-space: nowrap;\n  }\n  .banner-btn:active { transform: scale(0.95); background: rgba(61,138,122,0.2); }\n  .banner-btn.gym {\n    background: rgba(196,125,58,0.12);\n    border-color: rgba(196,125,58,0.3);\n    color: var(--dot-gym);\n  }\n  .banner-btn.gym:active { background: rgba(196,125,58,0.22); }\n\n  /* ── Header ── */\n  header {\n    padding-bottom: 22px;\n    margin-bottom: 22px;\n    border-bottom: 1px solid var(--border);\n  }\n\n  .eyebrow {\n    font-family: 'Karla', sans-serif;\n    font-size: 10px;\n    font-weight: 500;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--teal);\n    margin-bottom: 6px;\n  }\n\n  h1 {\n    font-family: 'Lora', serif;\n    font-size: 26px;\n    font-weight: 400;\n    line-height: 1.2;\n    color: var(--text);\n    margin-bottom: 4px;\n  }\n\n  h1 em {\n    font-style: italic;\n    color: var(--teal);\n  }\n\n  .tagline {\n    font-size: 12px;\n    color: var(--muted);\n    font-weight: 300;\n    letter-spacing: 0.02em;\n  }\n\n  /* ── Progress arc + numbers ── */\n  .progress-block {\n    display: grid;\n    grid-template-columns: auto 1fr;\n    gap: 14px;\n    align-items: center;\n    margin: 18px 0 4px;\n    padding: 14px 16px;\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 12px;\n  }\n\n  .arc-wrap {\n    width: 64px;\n    height: 64px;\n    position: relative;\n  }\n  .arc-wrap svg {\n    transform: rotate(-90deg);\n    width: 100%;\n    height: 100%;\n  }\n  .arc-track { stroke: var(--border); }\n  .arc-fill {\n    stroke: var(--teal);\n    stroke-linecap: round;\n    transition: stroke-dashoffset 1.2s ease;\n  }\n  .arc-num {\n    position: absolute;\n    inset: 0;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-family: 'Lora', serif;\n    font-size: 18px;\n    font-weight: 500;\n    color: var(--teal);\n  }\n\n  .progress-meta {\n    display: flex;\n    flex-direction: column;\n    gap: 2px;\n  }\n  .progress-line1 {\n    font-family: 'Lora', serif;\n    font-size: 16px;\n    color: var(--text);\n    line-height: 1.25;\n  }\n  .progress-line1 em { font-style: italic; color: var(--teal); }\n  .progress-line2 {\n    font-size: 11px;\n    color: var(--muted);\n    letter-spacing: 0.04em;\n  }\n  .progress-bar {\n    height: 2px;\n    background: var(--border);\n    border-radius: 2px;\n    margin-top: 8px;\n    overflow: hidden;\n  }\n  .progress-bar > div {\n    height: 100%;\n    background: linear-gradient(90deg, var(--lime), var(--teal));\n    border-radius: 2px;\n    transition: width 1s ease;\n  }\n\n  /* ── Stats ── */\n  .stats-row {\n    display: grid;\n    grid-template-columns: 1fr 1fr 1fr;\n    gap: 8px;\n    margin: 12px 0 20px;\n  }\n\n  .stat {\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 10px;\n    padding: 12px 8px;\n    text-align: center;\n  }\n\n  .stat-val {\n    font-family: 'Lora', serif;\n    font-size: 20px;\n    font-weight: 500;\n    color: var(--teal);\n    line-height: 1;\n  }\n\n  .stat-label {\n    font-size: 10px;\n    color: var(--muted);\n    font-weight: 400;\n    margin-top: 4px;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n  }\n\n  /* ── Legend ── */\n  .legend {\n    display: flex;\n    flex-wrap: wrap;\n    gap: 10px 16px;\n    margin-bottom: 6px;\n  }\n\n  .leg-item {\n    display: flex;\n    align-items: center;\n    gap: 6px;\n    font-size: 11px;\n    color: var(--muted);\n    font-weight: 400;\n  }\n\n  .leg-dot {\n    width: 7px; height: 7px;\n    border-radius: 50%;\n    flex-shrink: 0;\n  }\n\n  /* ── Pace guide ── */\n  .pace-guide {\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 10px;\n    padding: 14px;\n    margin: 20px 0;\n  }\n\n  .section-label {\n    font-size: 10px;\n    font-weight: 500;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 10px;\n  }\n\n  .pace-row {\n    display: grid;\n    grid-template-columns: 1fr 1fr auto;\n    gap: 4px;\n    padding: 6px 0;\n    border-bottom: 1px solid var(--border);\n    align-items: baseline;\n  }\n\n  .pace-row:last-child { border-bottom: none; }\n\n  .pace-zone {\n    font-size: 12px;\n    font-weight: 500;\n    color: var(--text);\n  }\n\n  .pace-feel {\n    font-size: 11px;\n    color: var(--muted);\n    font-weight: 300;\n    font-style: italic;\n  }\n\n  .pace-val {\n    font-family: 'Lora', serif;\n    font-size: 12px;\n    color: var(--teal);\n    text-align: right;\n    white-space: nowrap;\n  }\n\n  /* ── Phase headers ── */\n  .phase-header {\n    margin: 32px 0 12px;\n    padding: 14px 16px;\n    border-radius: 10px;\n    border-left: 3px solid;\n  }\n\n  .phase-header h2 {\n    font-family: 'Lora', serif;\n    font-size: 15px;\n    font-weight: 500;\n    color: var(--text);\n    margin-bottom: 4px;\n  }\n\n  .phase-header p {\n    font-size: 11px;\n    color: var(--muted);\n    font-weight: 300;\n    line-height: 1.5;\n  }\n\n  .ph-base  { background: var(--lime-soft); border-color: var(--lime); }\n  .ph-build { background: var(--teal-soft); border-color: var(--teal); }\n  .ph-sharp { background: rgba(143,175,90,0.08); border-color: var(--lime); }\n\n  /* ── Week cards ── */\n  .week-card {\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 12px;\n    margin-bottom: 8px;\n    overflow: hidden;\n    transition: box-shadow 0.2s, border-color 0.2s, transform 0.1s;\n    position: relative;\n  }\n\n  .week-card:active { transform: scale(0.997); }\n\n  .week-card.holiday {\n    background: var(--surface2);\n    border-style: dashed;\n    border-color: #c8cbbf;\n  }\n\n  /* Today's week — softly highlighted */\n  .week-card.today {\n    border-color: var(--teal);\n    box-shadow: 0 0 0 3px var(--teal-soft);\n  }\n  .week-card.today::before {\n    content: \"\";\n    position: absolute;\n    left: -1px; top: 14px; bottom: 14px;\n    width: 3px;\n    background: var(--teal);\n    border-radius: 0 3px 3px 0;\n    animation: breathe 4s ease-in-out infinite;\n  }\n  @keyframes breathe {\n    0%, 100% { opacity: 0.55; }\n    50%      { opacity: 1; }\n  }\n  @media (prefers-reduced-motion: reduce) {\n    .week-card.today::before { animation: none; opacity: 1; }\n  }\n\n  /* Past weeks — softly de-emphasized */\n  .week-card.past .week-num,\n  .week-card.past .week-dates { opacity: 0.55; }\n  .week-card.past .week-dots { opacity: 0.4; }\n\n  .week-header {\n    display: flex;\n    align-items: center;\n    padding: 14px 16px;\n    cursor: pointer;\n    user-select: none;\n    gap: 10px;\n    min-height: 48px;\n  }\n\n  .week-num {\n    font-family: 'Lora', serif;\n    font-size: 13px;\n    color: var(--muted);\n    min-width: 22px;\n    font-style: italic;\n  }\n\n  .week-card.today .week-num { color: var(--teal); font-weight: 500; }\n\n  .week-dates {\n    font-size: 13px;\n    font-weight: 500;\n    color: var(--text);\n    flex: 1;\n    letter-spacing: 0.01em;\n  }\n\n  .week-card.holiday .week-dates { color: var(--muted); }\n\n  .today-pill {\n    display: inline-block;\n    margin-left: 6px;\n    padding: 1px 7px;\n    background: var(--teal);\n    color: #fff;\n    font-size: 9px;\n    font-weight: 600;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    border-radius: 10px;\n    vertical-align: 1px;\n  }\n\n  .week-dots {\n    display: flex;\n    gap: 4px;\n    margin-right: 2px;\n  }\n\n  .wdot {\n    width: 6px; height: 6px;\n    border-radius: 50%;\n  }\n  .wdot.done { box-shadow: 0 0 0 1.5px var(--teal); transform: scale(1.3); }\n\n  .chevron {\n    color: var(--muted);\n    font-size: 10px;\n    transition: transform 0.25s ease;\n    flex-shrink: 0;\n  }\n\n  .week-card.open .chevron { transform: rotate(180deg); }\n\n  /* ── Week body ── */\n  .week-body {\n    max-height: 0;\n    overflow: hidden;\n    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);\n    border-top: 1px solid transparent;\n  }\n\n  .week-body.open {\n    max-height: 2400px;\n    border-top-color: var(--border);\n  }\n\n  .day-row {\n    display: grid;\n    grid-template-columns: 32px 1fr 28px;\n    gap: 10px;\n    align-items: start;\n    padding: 11px 14px;\n    border-bottom: 1px solid var(--border);\n    min-height: 44px;\n  }\n\n  .day-row:last-of-type { border-bottom: none; }\n\n  .day-row.today-day {\n    background: linear-gradient(90deg, var(--teal-soft), transparent 70%);\n  }\n\n  .day-row.done .session-title,\n  .day-row.done .session-detail {\n    text-decoration: line-through;\n    text-decoration-color: var(--border);\n    opacity: 0.55;\n  }\n\n  .day-name {\n    font-size: 9px;\n    font-weight: 500;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--muted);\n    padding-top: 3px;\n  }\n\n  .day-row.today-day .day-name { color: var(--teal); font-weight: 600; }\n\n  .session-type {\n    font-size: 9px;\n    font-weight: 500;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    margin-bottom: 2px;\n  }\n\n  /* Tap-to-complete check button */\n  .check-btn {\n    grid-column: 3;\n    align-self: center;\n    width: 26px;\n    height: 26px;\n    border-radius: 50%;\n    border: 1.5px solid var(--border);\n    background: transparent;\n    cursor: pointer;\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    color: transparent;\n    font-size: 14px;\n    line-height: 1;\n    transition: all 0.18s ease;\n    -webkit-tap-highlight-color: transparent;\n    flex-shrink: 0;\n  }\n  .check-btn:active { transform: scale(0.88); }\n  .day-row.done .check-btn {\n    background: var(--teal);\n    border-color: var(--teal);\n    color: #fff;\n  }\n  /* Hide check button on rest/race rows where it doesn't make sense — but keep grid alignment */\n  .check-btn[hidden] { visibility: hidden; }\n\n  .type-run   { color: var(--dot-run); }\n  .type-cycle { color: var(--dot-cycle); }\n  .type-gym   { color: var(--dot-gym); }\n  .type-mob   { color: var(--dot-mob); }\n  .type-rest  { color: var(--dot-rest); }\n  .type-race  { color: var(--teal); }\n\n  .session-title {\n    font-size: 13px;\n    font-weight: 500;\n    color: var(--text);\n    line-height: 1.3;\n  }\n\n  .session-detail {\n    font-size: 11px;\n    color: var(--muted);\n    font-weight: 300;\n    line-height: 1.5;\n    margin-top: 2px;\n  }\n\n  /* ── Notes ── */\n  .week-note {\n    margin: 0;\n    padding: 10px 14px;\n    border-top: 1px solid var(--lime-border);\n    background: var(--lime-soft);\n    font-size: 11px;\n    color: var(--lime);\n    font-weight: 400;\n    line-height: 1.5;\n  }\n\n  .week-note-teal {\n    margin: 0;\n    padding: 10px 14px;\n    border-top: 1px solid var(--teal-border);\n    background: var(--teal-soft);\n    font-size: 11px;\n    color: var(--teal);\n    font-weight: 400;\n    line-height: 1.5;\n  }\n\n  .holiday-note {\n    margin: 0;\n    padding: 10px 14px;\n    border-top: 1px solid var(--border);\n    background: var(--surface2);\n    font-size: 11px;\n    color: var(--muted);\n    font-style: italic;\n    line-height: 1.5;\n  }\n\n  /* ── Footer ── */\n  footer {\n    margin-top: 40px;\n    padding-top: 20px;\n    border-top: 1px solid var(--border);\n    font-size: 11px;\n    color: var(--muted);\n    font-weight: 300;\n    line-height: 1.9;\n  }\n\n  footer strong {\n    color: var(--text);\n    font-weight: 500;\n  }\n\n  /* ── Mobility icon button ── */\n  .mob-icon-btn {\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n    margin-top: 14px;\n    padding: 7px 13px 7px 10px;\n    background: var(--teal-soft);\n    border: 1px solid var(--teal-border);\n    border-radius: 20px;\n    font-family: 'Karla', sans-serif;\n    font-size: 11px;\n    font-weight: 500;\n    color: var(--teal);\n    cursor: pointer;\n    letter-spacing: 0.05em;\n    text-transform: uppercase;\n    transition: background 0.15s, transform 0.1s;\n    -webkit-tap-highlight-color: transparent;\n  }\n  .mob-icon-btn:active { transform: scale(0.97); background: rgba(61,138,122,0.2); }\n\n  /* ── Modal overlay ── */\n  .mob-overlay {\n    display: none;\n    position: fixed;\n    inset: 0;\n    background: rgba(44,48,40,0.55);\n    z-index: 100;\n    overflow-y: auto;\n    -webkit-overflow-scrolling: touch;\n  }\n  .mob-overlay.open { display: block; }\n\n  .mob-modal {\n    background: var(--bg);\n    min-height: 100vh;\n    max-width: 390px;\n    margin: 0 auto;\n    padding: 24px 16px 56px;\n  }\n\n  .mob-topbar {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    margin-bottom: 20px;\n    padding-bottom: 16px;\n    border-bottom: 1px solid var(--border);\n  }\n\n  .mob-title {\n    font-family: 'Lora', serif;\n    font-size: 22px;\n    font-weight: 400;\n    color: var(--text);\n  }\n\n  .mob-title em { font-style: italic; color: var(--teal); }\n\n  .mob-close {\n    background: none;\n    border: 1px solid var(--border);\n    border-radius: 6px;\n    padding: 6px 10px;\n    font-family: 'Karla', sans-serif;\n    font-size: 12px;\n    color: var(--muted);\n    cursor: pointer;\n  }\n\n  .mob-meta {\n    font-size: 11px;\n    color: var(--muted);\n    font-weight: 300;\n    margin-bottom: 20px;\n  }\n\n  /* ── Block headers ── */\n  .mob-block {\n    margin-bottom: 24px;\n  }\n\n  .mob-block-header {\n    display: flex;\n    align-items: baseline;\n    gap: 10px;\n    margin-bottom: 10px;\n  }\n\n  .mob-block-num {\n    font-family: 'Lora', serif;\n    font-size: 11px;\n    font-style: italic;\n    color: var(--muted);\n  }\n\n  .mob-block-title {\n    font-size: 10px;\n    font-weight: 500;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--teal);\n  }\n\n  .mob-block-time {\n    font-size: 10px;\n    color: var(--muted);\n    margin-left: auto;\n  }\n\n  /* ── Exercise cards ── */\n  .mob-exercise {\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 10px;\n    padding: 12px 14px;\n    margin-bottom: 8px;\n  }\n\n  .mob-exercise.stretch {\n    background: var(--lime-soft);\n    border-color: var(--lime-border);\n  }\n\n  .mob-ex-top {\n    display: flex;\n    align-items: start;\n    justify-content: space-between;\n    gap: 8px;\n  }\n\n  .mob-ex-name {\n    font-size: 13px;\n    font-weight: 500;\n    color: var(--text);\n    line-height: 1.3;\n  }\n\n  .mob-ex-dose {\n    font-family: 'Lora', serif;\n    font-size: 11px;\n    font-style: italic;\n    color: var(--teal);\n    white-space: nowrap;\n    flex-shrink: 0;\n  }\n\n  .mob-ex-note {\n    font-size: 11px;\n    color: var(--muted);\n    font-weight: 300;\n    line-height: 1.5;\n    margin-top: 4px;\n  }\n\n  .mob-ex-tag {\n    display: inline-block;\n    font-size: 9px;\n    font-weight: 500;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    padding: 1px 5px;\n    border-radius: 3px;\n    margin-top: 5px;\n  }\n\n  .tag-strength { background: rgba(196,125,58,0.12); color: var(--dot-gym); }\n  .tag-power    { background: rgba(61,138,122,0.12); color: var(--teal); }\n  .tag-stability{ background: rgba(143,175,90,0.12); color: var(--lime); }\n  .tag-stretch  { background: rgba(160,122,176,0.12); color: var(--dot-mob); }\n\n  .mob-divider {\n    height: 1px;\n    background: var(--border);\n    margin: 20px 0;\n  }\n\n  .mob-total {\n    background: var(--teal-soft);\n    border: 1px solid var(--teal-border);\n    border-radius: 8px;\n    padding: 12px 14px;\n    font-size: 11px;\n    color: var(--teal);\n    line-height: 1.6;\n    margin-top: 8px;\n  }\n\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"top-banner\">\n  <div class=\"top-banner-title\">Training <em>program<\u002Fem> · 2026<\u002Fdiv>\n  <button class=\"banner-btn\" onclick=\"openMobility()\" title=\"Mobility routine\">Mobility<\u002Fbutton>\n  <button class=\"banner-btn gym\" onclick=\"openGym()\" title=\"Gym exercises\">Gym<\u002Fbutton>\n<\u002Fdiv>\n\n<header>\n<\u002Fheader>\n\n<!-- Calm progress: arc on left, days-to-race on right -->\n<div class=\"progress-block\" id=\"progressBlock\">\n  <div class=\"arc-wrap\">\n    <svg viewBox=\"0 0 64 64\" aria-hidden=\"true\">\n      <circle class=\"arc-track\" cx=\"32\" cy=\"32\" r=\"27\" fill=\"none\" stroke-width=\"4\"><\u002Fcircle>\n      <circle class=\"arc-fill\" id=\"arcFill\" cx=\"32\" cy=\"32\" r=\"27\" fill=\"none\" stroke-width=\"4\" stroke-dasharray=\"169.65\" stroke-dashoffset=\"169.65\"><\u002Fcircle>\n    <\u002Fsvg>\n    <div class=\"arc-num\" id=\"arcNum\">—<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"progress-meta\">\n    <div class=\"progress-line1\" id=\"progressLine1\">Loading…<\u002Fdiv>\n    <div class=\"progress-line2\" id=\"progressLine2\">&nbsp;<\u002Fdiv>\n    <div class=\"progress-bar\"><div id=\"progressBar\" style=\"width:0%\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"stats-row\">\n  <div class=\"stat\">\n    <div class=\"stat-val\">22<\u002Fdiv>\n    <div class=\"stat-label\">weeks<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"stat\">\n    <div class=\"stat-val\">1:35<\u002Fdiv>\n    <div class=\"stat-label\">target<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"stat\">\n    <div class=\"stat-val\">4:31<\u002Fdiv>\n    <div class=\"stat-label\">per km<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"legend\">\n  <div class=\"leg-item\"><div class=\"leg-dot\" style=\"background:var(--dot-run)\"><\u002Fdiv>Run<\u002Fdiv>\n  <div class=\"leg-item\"><div class=\"leg-dot\" style=\"background:var(--dot-cycle)\"><\u002Fdiv>Cycle<\u002Fdiv>\n  <div class=\"leg-item\"><div class=\"leg-dot\" style=\"background:var(--dot u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"day-row\">\n      <div class=\"day-name\">Sat<\u002Fdiv>\n      <div>\n        <div class=\"session-type type-mob\">Mobility<\u002Fdiv>\n        <div class=\"session-title\">Full routine · 20 min<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"day-row\">\n      <div class=\"day-name\">Sun<\u002Fdiv>\n      <div>\n        <div class=\"session-type type-rest\">Rest<\u002Fdiv>\n        <div class=\"session-title\">Off<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"week-note-teal\">3 weeks to race. All the fitness is in the bank. Taper starts next week.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- W19 TAPER -->\n<div class=\"week-card\" id=\"w19\">\n  <div class=\"week-header\" onclick=\"toggle('w19')\">\n    <span class=\"week-num\">19<\u002Fspan>\n    <span class=\"week-dates\">Mon 14 – Sun 20 Sep &nbsp;·&nbsp; taper begins<\u002Fspan>\n    <div class=\"week-dots\">\n      <div class=\"wdot\" style=\"background:var(--dot-cycle)\"><\u002Fdiv>\n      <div class=\"wdot\" style=\"background:var(--dot-run)\"><\u002Fdiv>\n      <div class=\"wdot\" style=\"background:var(--dot-mob)\"><\u002Fdiv>\n      <div class=\"wdot\" style=\"background:var(--dot-gym)\"><\u002Fdiv>\n      <div class=\"wdot\" style=\"background:var(--dot-run)\"><\u002Fdiv>\n      <div class=\"wdot\" style=\"background:var(--dot-mob)\"><\u002Fdiv>\n    <\u002Fdiv>\n    <span class=\"chevron\">▾<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"week-body\">\n    <div class=\"day-row\">\n      <div class=\"day-name\">Mon<\u002Fdiv>\n      <div>\n        <div class=\"session-type type-cycle\">Cycle<\u002Fdiv>\n        <div class=\"session-title\">Easy spin<\u002Fdiv>\n        <div class=\"session-detail\">60 min · Z2 only. Volume drops 20% this week.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"day-row\">\n      <div class=\"day-name\">Tue<\u002Fdiv>\n      <div>\n        <div class=\"session-type type-run\">Run<\u002Fdiv>\n        <div class=\"session-title\">Easy + strides<\u002Fdiv>\n        <div class=\"session-detail\">10 km easy + 6× 20 sec strides. Feeling fresh is the goal now.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"day-row\">\n      <div class=\"day-name\">Wed<\u002Fdiv>\n      <div>\n        <div class=\"session-type type-mob\">Mobility<\u002Fdiv>\n        <div class=\"session-title\">Full routine · 20 min<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"day-row\">\n      <div class=\"day-name\">Thu<\u002Fdiv>\n      <div>\n        <div class=\"session-type type-gym\">Gym<\u002Fdiv>\n        <div class=\"session-title\">Final session<\u002Fdiv>\n        <div class=\"session-detail\">Very light. 2 sets each. Last gym session of the program. Don't be a hero.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"day-row\">\n      <div class=\"day-name\">Fri<\u002Fdiv>\n      <div>\n        <div class=\"session-type type-run\">Run<\u002Fdiv>\n        <div class=\"session-title\">Last quality session<\u002Fdiv>\n        <div class=\"session-detail\">8 km · 2 km easy · 4 km at 4:31/km · 2 km easy. Last real intensity before race day.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"day-row\">\n      <div class=\"day-name\">Sat<\u002Fdiv>\n      <div>\n        <div class=\"session-type type-mob\">Mobility<\u002Fdiv>\n        <div class=\"session-title\">Full routine · 20 min<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"day-row\">\n      <div class=\"day-name\">Sun<\u002Fdiv>\n      <div>\n        <div class=\"session-type type-rest\">Rest<\u002Fdiv>\n        <div class=\"session-title\">Off<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"week-note\">Taper madness is real — you'll feel sluggish and undertrained. You're not. Trust the process.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- W20 RACE WEEK -->\n<div class=\"week-card\" id=\"w20\">\n  <div class=\"week-header\" onclick=\"toggle('w20')\">\n    <span class=\"week-num\">20<\u002Fspan>\n    <span class=\"week-dates\">Mon 21 – Sun 27 Sep &nbsp;·&nbsp; race week<\u002Fspan>\n    <div class=\"week-dots\">\n      <div class=\"wdot\" style=\"background:var(--dot-cycle)\"><\u002Fdiv>\n      <div class=\"wdot\" style=\"background:var(--dot-run)\"><\u002Fdiv>\n      <div class=\"wdot\" style=\"background:var(--dot-mob)\"><\u002Fdiv>\n      <div class=\"wdot\" style=\"background:var(--dot-rest)\"><\u002Fdiv>\n      <div class=\"wdot\" style=\"background:var(--dot-run)\"><\u002Fdiv>\n      <div class=\"wdot\" style=\"background:var(--dot-mob)\"><\u002Fdiv>\n    <\u002Fdiv>\n    <span class=\"chevron\">▾<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"week-body\">\n    <div class=\"day-row\">\n      <div class=\"day-name\">Mon<\u002Fdiv>\n      <div>\n        <div class=\"session-type type-cycle\">Cycle<\u002Fdiv>\n        <div class=\"session-title\">Very easy spin<\u002Fdiv>\n        <div class=\"session-detail\">40 min · Z1 only. Just moving the legs. Nothing more.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"day-row\">\n      <div class=\"day-name\">Tue<\u002Fdiv>\n      <div>\n        <div class=\"session-type type-run\">Run<\u002Fdiv>\n        <div class=\"session-title\">Shakeout<\u002Fdiv>\n        <div class=\"session-detail\">6 km easy + 4× 20 sec race-pace strides. You should feel fast and light.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"day-row\">\n      <div class=\"day-name\">Wed<\u002Fdiv>\n      <div>\n        <div class=\"session-type type-mob\">Mobility<\u002Fdiv>\n        <div class=\"session-title\">Light routine · 20 min<\u002Fdiv>\n        <div class=\"session-detail\">No deep tissue work this close to race.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"day-row\">\n      <div class=\"day-name\">Thu<\u002Fdiv>\n      <div>\n        <div class=\"session-type type-rest\">Rest<\u002Fdiv>\n        <div class=\"session-title\">Off — no gym<\u002Fdiv>\n        <div class=\"session-detail\">Prepare kit. Eat well. Sleep.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"day-row\">\n      <div class=\"day-name\">Fri<\u002Fdiv>\n      <div>\n        <div class=\"session-type type-run\">Run<\u002Fdiv>\n        <div class=\"session-title\">Final shakeout<\u002Fdiv>\n        <div class=\"session-detail\">4 km very easy. Just to feel the legs. How it feels doesn't matter.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"day-row\">\n      <div class=\"day-name\">Sat<\u002Fdiv>\n      <div>\n        <div class=\"session-type type-mob\">Mobility<\u002Fdiv>\n        <div class=\"session-title\">10 min only — gentle<\u002Fdiv>\n        <div class=\"session-detail\">Lay out the kit. Eat carbs. Sleep early.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"day-row\">\n      <div class=\"day-name\">Sun<\u002Fdiv>\n      <div>\n        <div class=\"session-type type-race\">Race<\u002Fdiv>\n        <div class=\"session-title\">Halve van Haarlem · 27 September<\u002Fdiv>\n        <div class=\"session-detail\">Sub 1:35:00 · Start at 4:40/km for km 1–5 (feels too easy — good). Settle to 4:31 by km 8. Leave everything on the road after km 18.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"week-note-teal\">Race strategy: conservative first 5 km is not weakness — it's how you run a negative split and finish strong.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<footer>\n  <div class=\"footer-title\">A few things to keep in mind<\u002Fdiv>\n  <strong>Pace zones (feel-based):<\u002Fstrong><br>\n  Easy: full sentences, could go forever<br>\n  Tempo: short sentences, aware of effort<br>\n  Threshold: words only, heartbeat audible<br>\n  Race: ears pounding, nothing to say<br><br>\n  <strong>Shin protocol:<\u002Fstrong> New insoles before Week 1. If shins flare mid-program, replace the Friday quality session with 8 km easy — never push through stroke-width=\"2.4\"><\u002Fline>\n  <\u002Fg>\n  <!-- hand fist -->\n  <circle cx=\"32\" cy=\"68\" r=\"2.2\" fill=\"#3d8a7a\"><\u002Fcircle>\n  <!-- foot on bench -->\n  <ellipse cx=\"178\" cy=\"42\" rx=\"3.5\" ry=\"1.3\" fill=\"#8faf5a\"><\u002Fellipse>\n  <!-- hip lift cue -->\n  <path d=\"M105 60 L105 50\" stroke=\"#c47d3a\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath>\n  <polygon points=\"102,52 108,52 105,44\" fill=\"#c47d3a\"><\u002Fpolygon>\n  <text x=\"80\" y=\"76\" font-size=\"6.5\" fill=\"#c47d3a\" font-family=\"sans-serif\" font-style=\"italic\">lift hips · body straight<\u002Ftext>\n<\u002Fsvg>\n        <div class=\"mob-ex-note\">Side plank with top leg on a bench. Lift hips, hold straight. Brutal but the best adductor work going.<\u002Fdiv>\n        <span class=\"mob-ex-tag tag-stability\">Stability<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- Pallof press -->\n      <div class=\"mob-exercise\">\n        <div class=\"mob-ex-top\">\n          <div class=\"mob-ex-name\">Pallof Press<\u002Fdiv>\n          <div class=\"mob-ex-dose\">3 × 12 / side<\u002Fdiv>\n        <\u002Fdiv>\n        <svg viewBox=\"0 0 200 95\" width=\"100%\" style=\"margin:8px 0 4px;display:block;\" xmlns=\"http://www.w3.org/2000/svg\">\n  <line x1=\"10\" y1=\"86\" x2=\"190\" y2=\"86\" stroke=\"#dde0d8\" stroke-width=\"1.2\"><\u002Fline>\n  <ellipse cx=\"120\" cy=\"87\" rx=\"14\" ry=\"1.3\" fill=\"#dde0d8\"><\u002Fellipse>\n  <!-- anchor / stack -->\n  <rect x=\"14\" y=\"36\" width=\"10\" height=\"32\" rx=\"2\" fill=\"#dde0d8\" stroke=\"#bbbeae\" stroke-width=\"1\"><\u002Frect>\n  <circle cx=\"24\" cy=\"48\" r=\"2\" fill=\"#3d8a7a\"><\u002Fcircle>\n  <!-- cable -->\n  <path d=\"M24 48 Q60 50 96 52\" stroke=\"#8faf5a\" stroke-width=\"1.5\" fill=\"none\" stroke-dasharray=\"3,2\"><\u002Fpath>\n  <g stroke-linecap=\"round\" fill=\"none\">\n    <!-- head -->\n    <circle cx=\"120\" cy=\"18\" r=\"6\" stroke=\"#3d8a7a\" stroke-width=\"1.6\" fill=\"#fbfdfa\"><\u002Fcircle>\n    <line x1=\"120\" y1=\"24\" x2=\"120\" y2=\"58\" stroke=\"#3d8a7a\" stroke-width=\"2.6\"><\u002Fline>\n    <!-- legs slightly apart -->\n    <line x1=\"120\" y1=\"58\" x2=\"113\" y2=\"86\" stroke=\"#3d8a7a\" stroke-width=\"2.6\"><\u002Fline>\n    <line x1=\"120\" y1=\"58\" x2=\"127\" y2=\"86\" stroke=\"#3d8a7a\" stroke-width=\"2.6\"><\u002Fline>\n    <!-- arms pressed straight out forward (away from anchor — to the right of figure since anchor is on left) -->\n    <line x1=\"120\" y1=\"30\" x2=\"105\" y2=\"46\" stroke=\"#3d8a7a\" stroke-width=\"2\"><\u002Fline>\n    <line x1=\"105\" y1=\"46\" x2=\"98\" y2=\"52\" stroke=\"#8faf5a\" stroke-width=\"2.2\"><\u002Fline>\n    <line x1=\"120\" y1=\"30\" x2=\"135\" y2=\"46\" stroke=\"#3d8a7a\" stroke-width=\"2\"><\u002Fline>\n    <line x1=\"135\" y1=\"46\" x2=\"142\" y2=\"52\" stroke=\"#8faf5a\" stroke-width=\"2.2\"><\u002Fline>\n  <\u002Fg>\n  <!-- handle -->\n  <rect x=\"93\" y=\"49\" width=\"12\" height=\"6\" rx=\"1.5\" fill=\"rgba(143,175,90,0.3)\" stroke=\"#8faf5a\" stroke-width=\"1.3\"><\u002Frect>\n  <ellipse cx=\"113\" cy=\"86\" rx=\"4\" ry=\"1.3\" fill=\"#3d8a7a\"><\u002Fellipse>\n  <ellipse cx=\"127\" cy=\"86\" rx=\"4\" ry=\"1.3\" fill=\"#3d8a7a\"><\u002Fellipse>\n  <!-- anti-rotation cue -->\n  <path d=\"M75 38 Q90 32 100 40\" stroke=\"#c47d3a\" stroke-width=\"1.3\" fill=\"none\" stroke-linecap=\"round\" stroke-dasharray=\"2,2\"><\u002Fpath>\n  <path d=\"M100 40 L96 36\" stroke=\"#c47d3a\" stroke-width=\"1.3\" stroke-linecap=\"round\"><\u002Fpath>\n  <text x=\"60\" y=\"28\" font-size=\"6.5\" fill=\"#c47d3a\" font-family=\"sans-serif\" font-style=\"italic\">core resists pull<\u002Ftext>\n<\u002Fsvg>\n        <div class=\"mob-ex-note\">Cable or band at side, press hands straight forward, return. Core resists pulling you toward the anchor. Anti-rotation = run economy.<\u002Fdiv>\n        <span class=\"mob-ex-tag tag-stability\">Stability<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- Hollow body hold -->\n      <div class=\"mob-exercise\">\n        <div class=\"mob-ex-top\">\n          <div class=\"mob-ex-name\">Hollow Body Hold<\u002Fdiv>\n          <div class=\"mob-ex-dose\">3 × 20 sec<\u002Fdiv>\n        <\u002Fdiv>\n        <svg viewBox=\"0 0 200 70\" width=\"100%\" style=\"margin:8px 0 4px;display:block;\" xmlns=\"http://www.w3.org/2000/svg\">\n  <line x1=\"10\" y1=\"62\" x2=\"190\" y2=\"62\" stroke=\"#dde0d8\" stroke-width=\"1.2\"><\u002Fline>\n  <!-- back curved into floor (banana pressed flat) -->\n  <path d=\"M50 50 Q100 38 150 50\" stroke=\"#3d8a7a\" stroke-width=\"2.6\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n  <!-- head at left -->\n  <circle cx=\"48\" cy=\"48\" r=\"5.5\" stroke=\"#3d8a7a\" stroke-width=\"1.6\" fill=\"#fbfdfa\"><\u002Fcircle>\n  <!-- arms overhead extended -->\n  <line x1=\"48\" y1=\"48\" x2=\"22\" y2=\"38\" stroke=\"#8faf5a\" stroke-width=\"2.2\" stroke-linecap=\"round\"><\u002Fline>\n  <circle cx=\"22\" cy=\"38\" r=\"2.2\" fill=\"#8faf5a\"><\u002Fcircle>\n  <!-- legs extended right -->\n  <line x1=\"150\" y1=\"50\" x2=\"180\" y2=\"40\" stroke=\"#8faf5a\" stroke-width=\"2.6\" stroke-linecap=\"round\"><\u002Fline>\n  <ellipse cx=\"180\" cy=\"40\" rx=\"4\" ry=\"1.5\" fill=\"#8faf5a\" transform=\"rotate(20 180 40)\"><\u002Fellipse>\n  <!-- lower back glued to floor cue -->\n  <path d=\"M100 56 L100 60\" stroke=\"#c47d3a\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath>\n  <polygon points=\"97,58 103,58 100,62\" fill=\"#c47d3a\"><\u002Fpolygon>\n  <text x=\"60\" y=\"22\" font-size=\"6.5\" fill=\"#c47d3a\" font-family=\"sans-serif\" font-style=\"italic\">low back glued to floor<\u002Ftext>\n  <text x=\"20\" y=\"68\" font-size=\"6\" fill=\"#7a8070\" font-family=\"sans-serif\">if back lifts → raise hands &amp; feet higher<\u002Ftext>\n<\u002Fsvg>\n        <div class=\"mob-ex-note\">On back, arms overhead, legs straight, both lifted slightly. Lower back pressed into floor — non-negotiable. If it lifts, raise hands/feet higher.<\u002Fdiv>\n        <span class=\"mob-ex-tag tag-stability\">Stability<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mob-total\">\n      ~45 min total · Thursday is your gym day · the same five movements every time, you just get stronger at them.<br>\n      From W16 onwards: maintenance only — same exercises, −30% load. The point is keeping the muscle, not building new.\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  /* ─────────── Plan timeline ─────────── */\n  // Mon 11 May 2026 → Sun 27 Sep 2026 (race)\n  const PLAN_START = new Date(2026, 4, 11);   // local midnight\n  const RACE_DAY   = new Date(2026, 8, 27);\n\n  function startOfDay(d) {\n    return new Date(d.getFullYear(), d.getMonth(), d.getDate());\n  }\n  function daysBetween(a, b) {\n    return Math.round((startOfDay(b) - startOfDay(a)) / 86400000);\n  }\n\n  /* ─────────── Determine current week + day ─────────── */\n  const today = startOfDay(new Date());\n  const daysSinceStart = daysBetween(PLAN_START, today);\n  const daysToRace     = daysBetween(today, RACE_DAY);\n\n  // 0-indexed week number relative to plan start\n  let weekIndex = Math.floor(daysSinceStart / 7);\n  // Day of week within plan: 0 = Mon, 6 = Sun\n  let dayOfWeek = ((daysSinceStart % 7) + 7) % 7;\n\n  const beforePlan = daysSinceStart < 0;\n  const afterRace  = daysToRace < 0;\n  const inPlan     = !beforePlan && !afterRace;\n\n  /* ─────────── Progress UI ─────────── */\n  (function paintProgress() {\n    const arcNum   = document.getElementById('arcNum');\n    const arcFill  = document.getElementById('arcFill');\n    const line1    = document.getElementById('progressLine1');\n    const line2    = document.getElementById('progressLine2');\n    const bar      = document.getElementById('progressBar');\n\n    const totalWeeks = 22;\n    const C = 2 * Math.PI * 27; // arc circumference\n\n    let frac, displayWeek;\n    if (beforePlan) {\n      frac = 0;\n      displayWeek = 0;\n      line1.innerHTML = `Plan starts in <em>${-daysSinceStart}<\u002Fem> days`;\n      line2.textContent = `${daysToRace} days until race day`;\n    } else if (afterRace) {\n      frac = 1;\n      displayWeek = totalWeeks;\n      line1.innerHTML = `Race <em>complete<\u002Fem>`;\n      line2.textContent = `Halve van Haarlem · 27 Sep`;\n    } else {\n      displayWeek = Math.min(weekIndex + 1, totalWeeks);\n      frac = displayWeek / totalWeeks;\n      line1.innerHTML = `Week <em>${displayWeek}<\u002Fem> of ${totalWeeks}`;\n      line2.textContent = `${daysToRace} days to race day`;\n    }\n\n    arcNum.textContent = displayWeek;\n    // small delay so the animation is visible\n    requestAnimationFrame(() => {\n      arcFill.setAttribute('stroke-dashoffset', String(C * (1 - frac)));\n      bar.style.width = (frac * 100).toFixed(1) + '%';\n    });\n  })();\n\n  /* ─────────── Accordion toggle (with light haptic) ─────────── */\n  function tap() {\n    if (window.navigator.vibrate) try { navigator.vibrate(8); } catch (_) {}\n  }\n\n  function toggle(id) {\n    const card = document.getElementById(id);\n    if (!card) return;\n    const body = card.querySelector('.week-body');\n    const isOpen = body.classList.contains('open');\n    body.classList.toggle('open', !isOpen);\n    card.classList.toggle('open', !isOpen);\n    tap();\n  }\n\n  /* ─────────── Mark today's week + day ─────────── */\n  (function markToday() {\n    if (!inPlan) return;\n    const wid = 'w' + (weekIndex + 1);\n    const card = document.getElementById(wid);\n    if (!card) return;\n    card.classList.add('today');\n\n    // Add today pill to the dates label\n    const dates = card.querySelector('.week-dates');\n    if (dates && !dates.querySelector('.today-pill')) {\n      const pill = document.createElement('span');\n      pill.className = 'today-pill';\n      pill.textContent = 'today';\n      dates.appendChild(pill);\n    }\n\n    // Mark today's specific day-row\n    const dayRows = card.querySelectorAll('.day-row');\n    if (dayRows[dayOfWeek]) {\n      dayRows[dayOfWeek].classList.add('today-day');\n    }\n\n    // Mark all weeks before this as \"past\"\n    for (let i = 1; i < weekIndex + 1; i++) {\n      const c = document.getElementById('w' + i);\n      if (c) c.classList.add('past');\n    }\n  })();\n\n  /* ─────────── Auto-open today's week + scroll to it ─────────── */\n  (function autoOpen() {\n    let openId;\n    if (beforePlan) openId = 'w1';\n    else if (afterRace) openId = 'w22';\n    else openId = 'w' + (weekIndex + 1);\n\n    const card = document.getElementById(openId);\n    if (!card) return;\n    card.querySelector('.week-body').classList.add('open');\n    card.classList.add('open');\n\n    // After paint, scroll the card into a comfortable position\n    setTimeout(() => {\n      const rect = card.getBoundingClientRect();\n      const target = window.scrollY + rect.top - 80;\n      window.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });\n    }, 350);\n  })();\n\n  /* ─────────── Tap-to-complete checkmarks ─────────── */\n  // Storage key per session: w<week>-d<day>\n  function loadDone() {\n    try { return JSON.parse(localStorage.getItem('hvh-done') || '{}'); }\n    catch { return {}; }\n  }\n  function saveDone(map) {\n    try { localStorage.setItem('hvh-done', JSON.stringify(map)); } catch {}\n  }\n\n  (function attachChecks() {\n    const done = loadDone();\n\n    document.querySelectorAll('.week-card').forEach((card, wIdx) => {\n      const wId = card.id;\n      const rows = card.querySelectorAll('.day-row');\n      rows.forEach((row, dIdx) => {\n        // Skip if it's a \"Skip\"/no session row (rest, no cycle, no gym)\n        const typeEl = row.querySelector('.session-type');\n        const isRest = typeEl && /rest|race/i.test(typeEl.textContent.trim());\n\n        // Build check button (always present for grid alignment)\n        const btn = document.createElement('button');\n        btn.className = 'check-btn';\n        btn.setAttribute('aria-label', 'Mark session complete');\n        btn.innerHTML = '✓';\n        const key = wId + '-' + dIdx;\n        if (isRest) btn.hidden = true;\n        if (done[key]) row.classList.add('done');\n\n        btn.addEventListener('click', (e) => {\n          e.stopPropagation();\n          row.classList.toggle('done');\n          const map = loadDone();\n          if (row.classList.contains('done')) map[key] = 1;\n          else delete map[key];\n          saveDone(map);\n          tap();\n          // Update the corresponding wdot in the header\n          updateDots(card);\n        });\n\n        row.appendChild(btn);\n      });\n      updateDots(card);\n    });\n\n    function updateDots(card) {\n      const dots = card.querySelectorAll('.wdot');\n      const rows = card.querySelectorAll('.day-row');\n      // wdots only correspond to days mon-sat (6) — match by position\n      for (let i = 0; i < dots.length; i++) {\n        const row = rows[i];\n        if (row && row.classList.contains('done')) dots[i].classList.add('done');\n        else dots[i].classList.remove('done');\n      }\n    }\n  })();\n\n  /* ─────────── Soft fade-in on scroll ─────────── */\n  (function fadeIn() {\n    const cards = document.querySelectorAll('.week-card, .phase-header, .pace-guide, .progress-block, .stats-row, .legend');\n    cards.forEach(c => c.classList.add('fade-in'));\n\n    if (!('IntersectionObserver' in window)) {\n      cards.forEach(c => c.classList.add('visible'));\n      return;\n    }\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          e.target.classList.add('visible');\n          io.unobserve(e.target);\n        }\n      });\n    }, { rootMargin: '0px 0px -40px 0px', threshold: 0.05 });\n\n    cards.forEach(c => io.observe(c));\n  })();\n\n  /* ─────────── Mobility modal ─────────── */\n  function openMobility() {\n    const overlay = document.getElementById('mobOverlay');\n    overlay.classList.add('open');\n    document.body.style.overflow = 'hidden';\n    overlay.scrollTop = 0;\n    tap();\n  }\n\n  function closeMobility() {\n    const overlay = document.getElementById('mobOverlay');\n    overlay.classList.remove('open');\n    document.body.style.overflow = '';\n    tap();\n  }\n\n  document.getElementById('mobOverlay').addEventListener('click', function(e) {\n    if (e.target === this) closeMobility();\n  });\n\n  /* ─────────── Gym modal ─────────── */\n  function openGym() {\n    const overlay = document.getElementById('gymOverlay');\n    overlay.classList.add('open');\n    document.body.style.overflow = 'hidden';\n    if (navigator.vibrate) navigator.vibrate(10);\n  }\n  function closeGym() {\n    const overlay = document.getElementById('gymOverlay');\n    overlay.classList.remove('open');\n    document.body.style.overflow = '';\n  }\n  document.getElementById('gymOverlay').addEventListener('click', function(e) {\n    if (e.target === this) closeGym();\n  });\n\n  /* PWA SW disabled in standalone build */\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
